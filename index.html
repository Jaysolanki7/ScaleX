<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale-x</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo-container">
        <img
          src="https://kaleidoscopic-kashata-584e73.netlify.app/logo1.png"
          alt=""
          class="logo"
        />
        <h1>ScaleX</h1>
      </div>
      <nav>
        <a href="#home">Home</a>
        <a href="#about">About Us</a>
        <a href="#blogs">Blogs</a>
        <a href="#contact">Contact Us</a>
      </nav>
      <button>Get Started</button>
    </header>
    <main>
      <section class="main-headig-container">
        <h1 class="main-headig">Insights & Blogs</h1>
      </section>
      <section class="buttons">
        <button class="active btn">All</button>
        <button class="btn">Tech</button>
        <button class="btn">SasS</button>
        <button class="btn">Marketing</button>
      </section>
      <section class="cards-container">
        <div class="card">
          <img src="./assets/image.png" alt="" />
          <div class="card-desc">
            <h1>Tech</h1>
            <h2>The Ultimate Guide To SaaS Marketing</h2>
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <img src="./assets/image copy.png" alt="" />
          <div class="card-desc">
            <h1>SaaS</h1>
            <h2>5 Key Trends In SaaS Growth For 2025</h2>
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <img src="./assets/image copy 2.png" alt="" />
          <div class="card-desc">
            <h1>Markating</h1>
            <h2>How Data-Driven Strategies Are Important</h2>
            <p>May 23, 2025</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
